{% load static %}

<!-- slider-area-start -->
<div class="slider-area light-bg-s pt-60">
  <div class="container">
    <div class="row">
      <div class="col-12 p-0">
        <div class="swiper-container slider__active pb-30">
          <div class="slider-wrapper swiper-wrapper">

            <!-- Slide 1 -->
            <div class="single-slider swiper-slide b-radius-2 slider-height-2 d-flex align-items-center"
                 style="background-image: url('{% static 'assets/img/banner/1.1.jpg' %});">
              <div class="slider-content slider-content-2">
                <h2 class="pt-15 slider-title pb-5">Free shipping on the first order</h2>
                <p class="pr-20 slider_text">Take this chance and order what you need</p>
                <div class="slider-bottom-btn mt-65">
                  <a href="#" class="st-btn-border b-radius-2">Take the Chance</a>
                </div>
              </div>
            </div>

            <!-- Slide 2 -->
            <div class="single-slider swiper-slide b-radius-2 slider-height-2 d-flex align-items-center"
                 style="background-image: url('{% static 'assets/img/banner/2.jpg' %}');">
              <div class="slider-content slider-content-2">
                <h2 class="pt-15 slider-title pb-5">Free shipping on the first order</h2>
                <p class="pr-20 slider_text">Take this chance and order what you need</p>
                <div class="slider-bottom-btn mt-65">
                  <a href="#" class="st-btn-border b-radius-2">Take the Chance</a>
                </div>
              </div>
            </div>

            <!-- Slide 3 -->
            <div class="single-slider swiper-slide b-radius-2 slider-height-2 d-flex align-items-center"
                 style="background-image: url('{% static 'assets/img/banner/3.jpg' %}');">
              <div class="slider-content slider-content-2">
                <h2 class="pt-15 slider-title pb-5">Free shipping on the first order</h2>
                <p class="pr-20 slider_text">Take this chance and order what you need</p>
                <div class="slider-bottom-btn mt-65">
                  <a href="#" class="st-btn-border b-radius-2">Take the Chance</a>
                </div>
              </div>
            </div>

            <!-- Pagination dots (если нужно) -->
            <div class="main-slider-paginations"></div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- slider-area-end -->
